<!DOCTYPE html>

<title>MoneyWise Junior - Onboarding</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-asymmetry {
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-between overflow-x-hidden">
<!-- Top AppBar (Simplified for Onboarding as per Filter Rule) -->
<header class="w-full flex items-center justify-between px-6 py-6 sticky top-0 z-50 bg-background/50 backdrop-blur-md">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<span class="font-headline font-extrabold text-xl tracking-tight text-primary">MoneyWise Junior</span>
</div>
<button class="text-on-surface-variant font-label font-semibold text-sm uppercase tracking-widest hover:text-primary transition-colors">
            Skip
        </button>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-lg px-6 flex flex-col items-center justify-center relative">
<!-- Background Elements for Playful Depth -->
<div class="absolute -top-10 -right-20 w-64 h-64 bg-secondary-container/30 rounded-full blur-[80px] -z-10"></div>
<div class="absolute bottom-40 -left-20 w-72 h-72 bg-primary-fixed/40 rounded-full blur-[100px] -z-10"></div>
<!-- Asymmetric Illustration Section -->
<div class="relative w-full aspect-square mb-12 group">
<!-- Overlapping Floaties -->
<div class="absolute top-4 left-4 bg-surface-container-lowest p-4 rounded-xl shadow-xl z-20 flex items-center gap-3 scale-110 group-hover:translate-y-[-5px] transition-transform duration-500">
<div class="w-10 h-10 bg-tertiary-fixed rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="monetization_on" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
</div>
<div>
<p class="text-[10px] font-label font-bold text-on-surface-variant uppercase tracking-tighter">Gold Earned</p>
<p class="text-lg font-headline font-extrabold text-on-surface">+500</p>
</div>
</div>
<!-- Central Visual Asset -->
<div class="w-full h-full rounded-xl overflow-hidden shadow-[0px_30px_60px_rgba(17,28,44,0.12)] bg-surface-container relative">
<img class="w-full h-full object-cover" data-alt="3D vibrant illustration of a happy child holding a tablet playing a colorful money game with gold coins floating in the air, soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkq_ovqzDgnfPdXbAVIseKBYmymRw8Mr8tNvgHmJDxHcA7WXg0Kw3e1_hw7ebbgHoeeY19wPP_EdxuRd2uIXuQd-RmAhhP3thiUmEgiDN-MpzO_bAF87WoW-b3FaAYIKdnE177NmWgdwYcLD_JJaB1BY6WeWcyeRAKbLHFkpPPowGm-ApJHEj9o_lajb3sGR47sOvAqngLZxoJU2Ye8anR-6ZKgxApjT8L4_cO_mbZN4NZFqsgDwvkEkfvXwa7NlmbJzxzSAz5GEE"/>
<!-- Editorial Glass Overlay -->
<div class="absolute bottom-6 right-6 glass-card p-5 rounded-lg border border-white/40 shadow-2xl max-w-[180px]">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary text-lg" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-[11px] font-label font-bold text-on-surface-variant uppercase">New Achievement</span>
</div>
<p class="text-sm font-headline font-bold text-on-surface">Level 1: Coin Collector</p>
</div>
</div>
<!-- Floating Decor -->
<div class="absolute -bottom-8 -left-4 w-24 h-24 bg-gradient-to-tr from-primary to-primary-container rounded-full flex items-center justify-center text-white shadow-2xl z-20 group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-4xl" data-icon="sports_esports" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</div>
</div>
<!-- Copy & Identity -->
<section class="text-center w-full">
<span class="inline-block px-4 py-1.5 bg-surface-container-high rounded-full text-primary font-label font-bold text-[10px] uppercase tracking-[0.2em] mb-4">
                Step 01 / 03
            </span>
<h1 class="font-headline font-extrabold text-4xl md:text-5xl text-on-surface mb-6 leading-[1.1] tracking-tight">
                Learn by <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-container">Playing</span>
</h1>
<p class="text-on-surface-variant text-lg md:text-xl leading-relaxed font-body max-w-sm mx-auto">
                Master money basics through fun, interactive games and challenges.
            </p>
</section>
</main>
<!-- Controls & Actions -->
<footer class="w-full max-w-lg px-6 py-12 flex flex-col gap-8">
<!-- Progress Indicators -->
<div class="flex justify-center gap-3">
<div class="h-1.5 w-10 bg-primary rounded-full"></div>
<div class="h-1.5 w-4 bg-surface-container-highest rounded-full"></div>
<div class="h-1.5 w-4 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Primary Action -->
<div class="w-full">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white py-6 rounded-full font-headline font-bold text-xl shadow-[0px_20px_40px_rgba(0,97,132,0.25)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3 group">
                Continue
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Decorative Corner Element -->
<div class="fixed bottom-0 right-0 w-32 h-32 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-9xl text-primary" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
