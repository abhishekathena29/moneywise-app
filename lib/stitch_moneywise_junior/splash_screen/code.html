<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MoneyWise Junior - Welcome</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#3f484e",
                    "surface-container": "#e7eeff",
                    "surface-dim": "#cfdaf1",
                    "primary-fixed-dim": "#7cd0ff",
                    "tertiary-fixed": "#ffddb7",
                    "on-secondary-fixed": "#00201c",
                    "on-primary-fixed-variant": "#004c69",
                    "surface-container-high": "#dee8ff",
                    "surface-container-highest": "#d8e3fa",
                    "secondary-fixed-dim": "#59dbc7",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#ebf1ff",
                    "tertiary-container": "#a06600",
                    "on-primary-fixed": "#001e2c",
                    "tertiary": "#7f5000",
                    "outline": "#6f787f",
                    "on-surface": "#111c2c",
                    "surface-bright": "#f9f9ff",
                    "inverse-surface": "#263142",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#f5faff",
                    "on-background": "#111c2c",
                    "surface-tint": "#00658b",
                    "on-tertiary-fixed-variant": "#653e00",
                    "error-container": "#ffdad6",
                    "primary-fixed": "#c4e7ff",
                    "primary": "#006184",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#006b5f",
                    "surface-container-low": "#f0f3ff",
                    "surface-variant": "#d8e3fa",
                    "background": "#f9f9ff",
                    "error": "#ba1a1a",
                    "primary-container": "#007ba7",
                    "outline-variant": "#bfc8cf",
                    "on-tertiary-fixed": "#2a1700",
                    "on-tertiary-container": "#fff8f4",
                    "on-secondary-fixed-variant": "#005047",
                    "on-primary": "#ffffff",
                    "on-secondary-container": "#006f63",
                    "on-error-container": "#93000a",
                    "surface": "#f9f9ff",
                    "inverse-primary": "#7cd0ff",
                    "tertiary-fixed-dim": "#ffb95c",
                    "secondary-fixed": "#79f7e3",
                    "secondary-container": "#76f4e0",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Be Vietnam Pro"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background-color: #f9f9ff;
            background-image: 
                radial-gradient(at 0% 0%, #e7eeff 0, transparent 50%), 
                radial-gradient(at 100% 100%, #76f4e0 0, transparent 50%),
                radial-gradient(at 50% 50%, #ffffff 0, transparent 50%);
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .stagger-1 { animation-delay: 0s; }
        .stagger-2 { animation-delay: 1.5s; }
        .stagger-3 { animation-delay: 3s; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-mesh font-body text-on-surface overflow-hidden h-screen w-screen flex flex-col items-center justify-center relative">
<!-- Decorative Floating Icons (Playful Background) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<!-- Top Left -->
<div class="absolute top-[10%] left-[15%] floating stagger-1 opacity-20 text-primary">
<span class="material-symbols-outlined text-6xl" data-icon="savings">savings</span>
</div>
<!-- Bottom Left -->
<div class="absolute bottom-[15%] left-[10%] floating stagger-3 opacity-20 text-secondary">
<span class="material-symbols-outlined text-5xl" data-icon="payments">payments</span>
</div>
<!-- Top Right -->
<div class="absolute top-[20%] right-[12%] floating stagger-2 opacity-20 text-tertiary">
<span class="material-symbols-outlined text-4xl" data-icon="stars">stars</span>
</div>
<!-- Bottom Right -->
<div class="absolute bottom-[20%] right-[15%] floating stagger-1 opacity-20 text-primary-container">
<span class="material-symbols-outlined text-7xl" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<!-- Scattered small coins -->
<div class="absolute top-[45%] left-[5%] floating stagger-2 opacity-10 text-secondary">
<span class="material-symbols-outlined text-3xl" data-icon="monetization_on">monetization_on</span>
</div>
<div class="absolute top-[70%] right-[8%] floating stagger-3 opacity-10 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="monetization_on">monetization_on</span>
</div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center justify-center px-6 text-center">
<!-- Logo Section -->
<div class="mb-12 relative">
<!-- Glow effect behind logo -->
<div class="absolute inset-0 bg-primary/10 blur-[60px] rounded-full scale-150"></div>
<div class="relative bg-surface-container-lowest p-8 rounded-xl shadow-[0px_20px_40px_rgba(17,28,44,0.06)] flex items-center justify-center aspect-square w-48 border border-white/50 backdrop-blur-sm">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-7xl mb-2" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
<div class="h-1.5 w-12 bg-secondary-container rounded-full"></div>
</div>
</div>
</div>
<!-- Brand Text -->
<div class="max-w-md mx-auto">
<h1 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tighter text-primary mb-4 leading-tight">
                MoneyWise <span class="text-secondary">Junior</span>
</h1>
<p class="text-on-surface-variant text-lg font-medium tracking-wide max-w-sm mx-auto mb-10 leading-relaxed">
                Empowering the next generation of financial superstars.
            </p>
</div>
<!-- Action Section -->
<div class="flex flex-col gap-4 w-full max-w-xs">
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg py-5 px-8 rounded-full shadow-[0px_20px_40px_rgba(17,28,44,0.1)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                Get Started
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="bg-surface-container-highest text-primary font-bold text-lg py-5 px-8 rounded-full hover:scale-[1.02] active:scale-95 transition-all">
                Login
            </button>
</div>
<!-- Footer Milestone / Teaser Badge -->
<div class="mt-16 bg-white/40 backdrop-blur-xl border border-white/60 px-6 py-3 rounded-full flex items-center gap-3 shadow-sm">
<div class="bg-tertiary-container w-8 h-8 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<span class="text-on-surface font-semibold text-sm tracking-wide">Join 50,000+ Junior Scholars</span>
</div>
</main>
<!-- Bottom Illustration Credit / Subtle Detail -->
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-full max-w-2xl px-6 opacity-40">
<div class="h-0.5 bg-gradient-to-r from-transparent via-primary/20 to-transparent w-full"></div>
</div>
</body></html>
